<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج سريع | Fast Chess vs AI</title>
    <meta name="description" content="العب الشطرنج ضد محرك ذكي. Play chess against the Stockfish engine.">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://code.jquery.com https://unpkg.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' https://chessboardjs.com data:;">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="game-container">
    <header>
        <h1 data-i18n="title">شطرنج سريع</h1>
        <button class="icon-btn" id="langToggle" title="Switch Language">EN</button>
        <button class="icon-btn" id="themeToggle" title="Toggle Dark Mode">🌙</button>
    </header>

    <div id="board"></div>

    <div class="controls">
        <select id="difficulty" title="Select AI Difficulty">
            <option value="0" data-i18n="diffBeginner">مبتدئ</option>
            <option value="5" data-i18n="diffIntermediate" selected>متوسط</option>
            <option value="15" data-i18n="diffAdvanced">صعب</option>
            <option value="20" data-i18n="diffExpert">خبير</option>
        </select>
        <button id="resetBtn" class="primary-btn" data-i18n="newGame">لعبة جديدة</button>
    </div>

    <div id="status-container">
        <span id="status" data-i18n="statusWhite">دور الأبيض للتحرك</span>
        <span id="aiThinking" class="ai-thinking" data-i18n="aiThinking">الذكاء الاصطناعي يفكر...</span>
    </div>

    <div id="promotionModal">
        <div class="modal-content">
            <h3 data-i18n="promoTitle">اختر الترقية</h3>
            <div class="promo-pieces">
                <button class="promo-btn" data-piece="q">♕</button>
                <button class="promo-btn" data-piece="r">♖</button>
                <button class="promo-btn" data-piece="b">♗</button>
                <button class="promo-btn" data-piece="n">♘</button>
            </div>
        </div>
    </div>
</main>

<footer>
    <p data-i18n="footerText">تطوير بواسطة <a href="https://www.linkedin.com/in/mahmoud-ghosheh/" target="_blank" rel="noopener noreferrer">Mahmoud Ghosheh</a></p>
</footer>

<div id="toast"></div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>

</body>
</html>
